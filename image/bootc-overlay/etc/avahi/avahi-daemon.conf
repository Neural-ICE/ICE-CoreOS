# Neural ICE CoreOS — minimal mDNS responder.
#
# Publishes ONLY this host's <hostname>.local address record. The hostname is set
# by neural-ice-hostname-init from the management NIC MAC (ni-coreos-<mac4>);
# host-name is left unset here so avahi always follows the system hostname.
#
# No workstation advertisement, no HINFO record (avoids leaking OS/CPU model over
# the LAN), no reflector. Any product SERVICE advertisement is added by the
# application layer via files in /etc/avahi/services/, not here.

[server]
use-ipv4=yes
use-ipv6=yes
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[publish]
publish-hinfo=no
publish-workstation=no
publish-addresses=yes

[reflector]
enable-reflector=no

[rlimits]
rlimit-nproc=3
