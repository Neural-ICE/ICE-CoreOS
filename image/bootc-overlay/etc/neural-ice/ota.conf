# Neural ICE OTA verification config (ICE-Fabric OTA signing plan).
# Read by the on-device verifier `ni-ota-verify` before ANY update is applied.
# Format: key=value, one per line; lines starting with '#' are comments.

# 0 = shadow for non-authority rollout checks only; authenticity, signed bindings, target/ring, anti-rollback and bundle identity still refuse. 1 = enforce every failed check.
enforce=0

# TPM2 NV index holding the monotonic applied bundle sequence (anti-rollback counter; provisioned at first boot).
nv_index=0x01500001

# Registry host serving the signed channel records and bundle manifests (sovereign registry — single egress domain).
registry=registry.neural-ice.ch

# OCI repository (under `registry`) of the signed channel records, tagged per channel — the device resolves its own channel tag.
channel_ref=neural-ice/channels

# OCI repository (under `registry`) of the signed bundle manifests, tagged per release train.
bundle_ref=neural-ice/bundles

# OTA root public key: verifies the bundle-manifest and channel-record signatures (the authoritative gate).
root_pubkey=/etc/neural-ice/keys/ota-root.pub

# CI image public key: verifies per-image cosign signatures on first-party images (defense in depth under the root gate).
image_pubkey=/etc/neural-ice/keys/image-ci.pub

# Verifier runtime state (last verdict, applied-bundle record); created by tmpfiles.d (neural-ice-ota.conf).
state_dir=/var/lib/neural-ice/ota

# Device ring and compatibility are INSTANCE config, deliberately unset in the
# vanilla image. hardware_target is image-owned and must match the immutable marker
# in /usr/lib/neural-ice/hardware-target (ADR-0010).
# Missing ring/compat values warn in shadow and refuse in enforce mode.
#device_channel=stable
hardware_target=nvidia-gb10-arm64
#device_compat_min=1
#device_compat_max=3
