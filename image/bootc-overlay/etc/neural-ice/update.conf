# Neural ICE CoreOS — OTA config (PUBLIC GHCR model + bootc).
# Public OS image -> NO registry credentials. Gate = Keygen license only.
# (The target image of `bootc upgrade` = origin recorded at install time, not here.)

# --- Keygen.sh (subscription entitlements) ---
KEYGEN_API="https://api.keygen.sh/v1"
KEYGEN_ACCOUNT_ID="REPLACE_WITH_KEYGEN_ACCOUNT_UUID"

# --- Local license (pushed by the Tauri thin client at onboarding) ---
LICENCE_FILE="/var/lib/neural-ice/licence.json"

# --- Update policy ---
AUTO_REBOOT="false"          # true => bootc upgrade --apply (reboot if new deployment)
OFFLINE_GRACE_HOURS="168"    # offline tolerance (7 days) — HPC/maintenance resilience

# --- NVIDIA driver (baked into the image; informational only) ---
NVIDIA_DRIVER_VERSION="595.58.03"
