# GB10 GPU: the nvidia open modules live in the initramfs (udev coldplug loads
# them there), but the 72 MB GSP firmware (gsp_ga10x.bin) does NOT — so the
# early load fails ENOENT, RmInitAdapter dies, and the GPU is dead for the whole
# session. That also collapses the console: with no nvidia KMS, fbcon is stuck
# on simpledrm at the firmware GOP mode (800x600), so the appliance TUI renders
# cramped at ~37x100 instead of the panel's native ~67x240 (1920x1080).
# Ship the GSP firmware IN the initramfs and force the nvidia drivers early so
# the GPU initializes deterministically and nvidia-drm owns the console from
# boot. (Found live on the .72, 2026-07-23: the failure was intermittent — a
# race the early load sometimes won — which read as a TUI/GPU "regression".)
install_items+=" /usr/lib/firmware/nvidia/595.58.03/gsp_ga10x.bin /usr/lib/firmware/nvidia/595.58.03/gsp_tu10x.bin "
force_drivers+=" nvidia nvidia_modeset nvidia_drm nvidia_uvm "
