# Neural ICE installer: on an install boot the autoinstall service owns tty1
# from basic.target on. Skip getty@tty1 entirely (a later getty start job
# would otherwise resolve its Conflicts= by STOPPING the install mid-flight).
# Live boots (no neuralice.autoinstall karg) keep their tty1 login untouched.
[Unit]
ConditionKernelCommandLine=!neuralice.autoinstall
