name: test-installer-handoff

on:
  push:
    branches: [main]
    paths:
      - "ota/neural-ice-autoinstall.sh"
      - "ota/neural-ice-lab-baseline-handoff.sh"
      - "ota/test-neural-ice-lab-baseline-handoff.sh"
      - "image/Containerfile.installer"
      - "image/build-preloaded.sh"
      - "docs/PRELOADED-EDITION.md"
      - ".github/workflows/test-installer-handoff.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.repository == 'Neural-ICE/ICE-CoreOS' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Validate installer shell
        run: |
          bash -n ota/neural-ice-autoinstall.sh \
            ota/neural-ice-lab-baseline-handoff.sh \
            ota/test-neural-ice-lab-baseline-handoff.sh
          shellcheck ota/neural-ice-autoinstall.sh \
            ota/neural-ice-lab-baseline-handoff.sh \
            ota/test-neural-ice-lab-baseline-handoff.sh \
            image/build-preloaded.sh
      - name: Test ESP handoff and non-root refusal
        run: ./ota/test-neural-ice-lab-baseline-handoff.sh

  test-root-install:
    # The X64 runner intentionally has neither sudo nor user namespaces. The
    # Spark build runner already exposes passwordless sudo to its bounded CI
    # jobs, so use it only for the positive root-owned persistence contract.
    if: github.repository == 'Neural-ICE/ICE-CoreOS' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, ARM64, spark]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Test durable root-owned handoff
        run: sudo -n ./ota/test-neural-ice-lab-baseline-handoff.sh
