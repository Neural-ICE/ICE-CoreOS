name: test-artifact-generation

on:
  pull_request:
    paths:
      - "ci/artifact-generation.sh"
      - "ci/canonicalize-vmlinuz.sh"
      - "ci/stage-artifacts.sh"
      - "ci/test-artifact-generation.sh"
      - "ci/build-image.sh"
      - "ci/verify-build-context.sh"
      - "secureboot/trust-policies/**"
      - "build/build-kernel.sh"
      - "build/patches/nvidia-open-inline-sign.patch"
      - "ci/test-kernel-packaging-patch.sh"
      - ".github/workflows/build-kernel.yml"
      - ".github/workflows/build-image.yml"
      - ".github/workflows/test-artifact-generation.yml"
  push:
    branches: [main]
    paths:
      - "ci/artifact-generation.sh"
      - "ci/canonicalize-vmlinuz.sh"
      - "ci/stage-artifacts.sh"
      - "ci/test-artifact-generation.sh"
      - "ci/build-image.sh"
      - "ci/verify-build-context.sh"
      - "secureboot/trust-policies/**"
      - "build/build-kernel.sh"
      - "build/patches/nvidia-open-inline-sign.patch"
      - "ci/test-kernel-packaging-patch.sh"
      - ".github/workflows/build-kernel.yml"
      - ".github/workflows/build-image.yml"
      - ".github/workflows/test-artifact-generation.yml"

permissions:
  contents: read

jobs:
  test:
    # ICE-CoreOS is public: never execute code from an untrusted fork on an
    # organization self-hosted runner.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Validate shell syntax
        run: |
          shellcheck ci/artifact-generation.sh ci/canonicalize-vmlinuz.sh \
            ci/stage-artifacts.sh ci/test-artifact-generation.sh ci/build-image.sh \
            ci/verify-build-context.sh ci/test-kernel-packaging-patch.sh \
            build/build-kernel.sh
      - name: Test artifact generation and kernel packaging contract
        run: |
          ./ci/test-artifact-generation.sh
          ./ci/test-kernel-packaging-patch.sh
