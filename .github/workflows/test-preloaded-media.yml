---
name: test-preloaded-media

on:
  push:
    branches:
      - main
    paths:
      - 'image/build-preloaded.sh'
      - 'image/seed-tree-manifest.py'
      - 'image/verify-preloaded-media.py'
      - 'image/test-seed-tree-manifest.py'
      - 'image/test-verify-preloaded-media.sh'
      - '.github/workflows/test-preloaded-media.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-preloaded-media-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-x86_64-portable:
    if: github.repository == 'Neural-ICE/ICE-CoreOS' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - name: Portable manifest tests
        run: |
          python3 -m py_compile \
            image/seed-tree-manifest.py \
            image/verify-preloaded-media.py
          python3 image/test-seed-tree-manifest.py
          shellcheck \
            image/build-preloaded.sh \
            image/test-verify-preloaded-media.sh
  linux-arm64:
    if: github.repository == 'Neural-ICE/ICE-CoreOS' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, ARM64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - name: Portable manifest tests
        run: |
          python3 -m py_compile \
            image/seed-tree-manifest.py \
            image/verify-preloaded-media.py
          python3 image/test-seed-tree-manifest.py
          shellcheck \
            image/build-preloaded.sh \
            image/test-verify-preloaded-media.sh
      - name: Final raw-media integration
        if: github.event_name == 'push'
        run: >-
          sudo --non-interactive --preserve-env=PATH
          bash image/test-verify-preloaded-media.sh
