name: build-image

# The hardware-bound GB10 bootc producer publishes one immutable GHCR artifact.
# ICE-Fabric alone mirrors its approved digest to the sovereign registry, and
# only a signed release train moves beta/stable product pointers.
on:
  # Owner-operated LAB path. It is deliberately input-free: a manual run is
  # always a keyless debug build from main and still publishes only the
  # run-unique immutable GHCR tag produced below.
  workflow_dispatch:
  # repository_dispatch executes the workflow from the default branch. Requiring
  # an explicit variant prevents a merge from silently producing a prod artifact
  # from a LAB-finalized runner-local generation.
  repository_dispatch:
    types: [build-coreos]

jobs:
  validate-request:
    # This architecture-neutral guard runs without checkout or token privileges,
    # so an invalid manual ref fails visibly without reserving the Spark.
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    permissions: {}
    env:
      EVENT_NAME: ${{ github.event_name }}
      REQUEST_REF: ${{ github.ref }}
      VARIANT: ${{ github.event_name == 'workflow_dispatch' && 'debug' || github.event.client_payload.variant }}
    steps:
      - name: Validate the explicit build request
        run: |
          if [ "$EVENT_NAME" = workflow_dispatch ] && [ "$REQUEST_REF" != refs/heads/main ]; then
            echo "::error::manual debug builds must run from refs/heads/main"; exit 2
          fi
          case "$VARIANT" in
            debug|prod) ;;
            *) echo "::error::the requested variant must be exactly debug or prod"; exit 2 ;;
          esac

  build:
    needs: validate-request
    # Shared with build-kernel because both workflows use the same runner-local
    # immutable artifact store. Validation above is intentionally outside this
    # queue so malformed requests fail immediately.
    concurrency:
      group: coreos-gb10-artifacts-nvidia-gb10-arm64
      cancel-in-progress: false
    runs-on: [self-hosted, Linux, ARM64, spark]
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io/neural-ice
      IMAGE: neural-ice-coreos
      VARIANT: ${{ github.event_name == 'workflow_dispatch' && 'debug' || github.event.client_payload.variant }}
      BUILD_ID: ${{ github.run_id }}.${{ github.run_attempt }}
      SOURCE_REVISION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Materialize verified GB10 artifact generation
        env:
          ARTIFACTS_DIR: ${{ vars.ARTIFACTS_DIR }}
        run: |
          set -euo pipefail
          ARTIFACTS_ROOT="${ARTIFACTS_DIR:-$HOME/neural-ice/artifacts}" STAGING_DEST=image \
            ./ci/artifact-generation.sh materialize | tee artifact-generation.out
          generation="$(sed -n 's/^CURRENT_GENERATION=//p' artifact-generation.out)"
          echo "ARTIFACT_GENERATION=$generation" >> "$GITHUB_ENV"

      - name: Bind the generation to the approved variant trust policy
        run: |
          set -euo pipefail
          ./ci/verify-build-context.sh image "$VARIANT" | tee build-context.out
          for key in CURRENT_GENERATION ARTIFACT_MANIFEST_SHA256 \
            SIGNED_BOOT_TRUST_POLICY_ID SIGNED_BOOT_TRUST_POLICY_SHA256; do
            value="$(awk -F= -v key="$key" \
              '$1 == key {sub(/^[^=]*=/, ""); print; found++} END {exit found == 1 ? 0 : 1}' \
              build-context.out)" \
              || { echo "::error::preflight did not report exactly one $key"; exit 3; }
            echo "$key=$value" >> "$GITHUB_ENV"
          done

      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and publish immutable source artifact
        env:
          PUSH: "1"
          PODMAN_SUDO: "1"
          SOURCE_URL: https://github.com/${{ github.repository }}
          # Debug remains keyless. The installer injects the operator key from
          # EFI:/ice-coreos/authorized_keys; no CI signing/key secret is baked.
          SSH_AUTHORIZED_KEY: ""
        run: |
          set -o pipefail
          ./ci/build-image.sh | tee build.out

      - name: Assert the shipping platform and summarize the handoff
        run: |
          set -euo pipefail
          semver="$(grep -m1 '^SEMVER=' build.out | cut -d= -f2)"
          ref="$(grep -m1 '^REF=' build.out | cut -d= -f2)"
          digest="$(grep -m1 '^DIGEST=' build.out | cut -d= -f2)"
          manifest_sha256="$(grep -m1 '^ARTIFACT_MANIFEST_SHA256=' build.out | cut -d= -f2)"
          policy_id="$(grep -m1 '^SIGNED_BOOT_TRUST_POLICY_ID=' build.out | cut -d= -f2)"
          policy_sha256="$(grep -m1 '^SIGNED_BOOT_TRUST_POLICY_SHA256=' build.out | cut -d= -f2)"
          sudo podman image inspect "$ref:$semver" --format '{{.Os}}/{{.Architecture}}' \
            | grep -qx linux/arm64
          sudo podman image inspect "$ref:$semver" \
            --format '{{index .Labels "ch.neural-ice.artifact-generation"}}' \
            | grep -Fx "$ARTIFACT_GENERATION"
          [[ "$manifest_sha256" =~ ^[0-9a-f]{64}$ ]] \
            || { echo "::error::invalid artifact manifest hash '$manifest_sha256'"; exit 1; }
          sudo podman image inspect "$ref:$semver" \
            --format '{{index .Labels "ch.neural-ice.artifact-manifest-sha256"}}' \
            | grep -Fx "$manifest_sha256"
          [[ "$policy_id" == "$SIGNED_BOOT_TRUST_POLICY_ID" \
            && "$policy_sha256" == "$SIGNED_BOOT_TRUST_POLICY_SHA256" \
            && "$policy_sha256" =~ ^[0-9a-f]{64}$ ]] \
            || { echo "::error::build trust-policy output differs from preflight"; exit 1; }
          sudo podman image inspect "$ref:$semver" \
            --format '{{index .Labels "ch.neural-ice.signed-boot-trust-policy-id"}}' \
            | grep -Fx "$policy_id"
          sudo podman image inspect "$ref:$semver" \
            --format '{{index .Labels "ch.neural-ice.signed-boot-trust-policy-sha256"}}' \
            | grep -Fx "$policy_sha256"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] \
            || { echo "::error::invalid published digest '$digest'"; exit 1; }
          {
            echo "### Immutable ICE-CoreOS source artifact"
            echo ""
            echo "- source: \`$ref@$digest\`"
            echo "- immutable tag: \`$ref:$semver\`"
            echo "- variant: \`$VARIANT\`"
            echo "- platform: \`linux/arm64\` (GB10 ADR-0009)"
            echo "- artifact generation: \`$ARTIFACT_GENERATION\`"
            echo "- artifact manifest SHA-256: \`$manifest_sha256\`"
            echo "- signed-boot trust policy: \`$policy_id@$policy_sha256\`"
            echo "- next gate: ICE-Fabric central mirror + signed beta train"
            echo "- channel/alias mutation: none"
          } >> "$GITHUB_STEP_SUMMARY"
