name: build-kernel

# RARELY run: rebuild the heavy GB10 artifacts (GB10 kernel (4k) RPMs + signed
# NVIDIA modules + nvidia userspace + signed boot binaries) and stage them into
# the image/ tree so the build-image workflow can consume them. Manual only.
#
# This is a long, hardware/source-specific build (the GB10 kernel, STANDARD 4k
# flavor, from the Red Hat nvidia-gb10 tree — see ADR-0006). It runs on the
# self-hosted ARM64 runner that holds the
# upstream sources. Output stays on that runner as an immutable, checksummed
# candidate. This workflow never moves `current`; signing/finalization is a
# separate Owner-controlled gate.

# repository_dispatch always executes the workflow from the default branch. A
# selectable workflow_dispatch branch must never write persistent staging.
on:
  repository_dispatch:
    types: [build-coreos-kernel]

concurrency:
  # Shared with build-image: an image can never observe a generation while the
  # producer is still publishing it on the Spark runner.
  group: coreos-gb10-artifacts-nvidia-gb10-arm64
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  kernel:
    runs-on: [self-hosted, Linux, ARM64, spark]
    timeout-minutes: 600
    env:
      KERNEL_REF: ${{ github.event.client_payload.kernel_ref || 'fa4faa0227e00c2291e47b120e71c7aed0fe27b7' }}
      KERNEL_SOURCE_REVISION: ${{ github.event.client_payload.kernel_ref || 'fa4faa0227e00c2291e47b120e71c7aed0fe27b7' }}
      NVIDIA_DRIVER_VERSION: ${{ github.event.client_payload.nvidia_driver_version || '595.58.03' }}
      ARTIFACTS_ROOT: ${{ vars.ARTIFACTS_DIR || '/opt/ice-coreos/artifacts' }}
      GENERATION_ID: ${{ github.run_id }}.${{ github.run_attempt }}
      SOURCE_REVISION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build GB10 kernel (4k) + NVIDIA driver artifacts
        run: |
          # Option D builds the NVIDIA open modules in-tree (ephemeral-signed);
          # point at the kernel-open source. Overridable; default derives from the
          # driver version on the self-hosted runner.
          export NVIDIA_OPEN_SRC="${NVIDIA_OPEN_SRC:-$HOME/nvidia-userspace-build/NVIDIA-Linux-aarch64-${NVIDIA_DRIVER_VERSION}/kernel-open}"
          RPM_SRC="$RUNNER_TEMP/ice-coreos-kernel-${GENERATION_ID}/rpms"
          rm -rf "$(dirname "$RPM_SRC")"
          install -d -m 0755 "$RPM_SRC"
          export RPM_SRC OUTPUT_DIR="$RPM_SRC"
          echo "RPM_SRC=$RPM_SRC" >> "$GITHUB_ENV"
          ./build/build-kernel.sh aarch64

      - name: Publish kernel candidate
        run: ./ci/stage-artifacts.sh

      - name: Report published candidate
        run: |
          set -euo pipefail
          ./ci/artifact-generation.sh verify-candidate "$GENERATION_ID"
          {
            echo "### Published GB10 kernel candidate"
            echo ""
            echo "- candidate: \`$GENERATION_ID\`"
            echo "- target: \`nvidia-gb10-arm64\`"
            for d in rpms nvidia-userspace; do
              echo "- \`$d\`: $(find "$ARTIFACTS_ROOT/candidates/$GENERATION_ID/$d" -type f | wc -l) files"
            done
            echo "- current pointer mutation: none"
            echo "- next gate: sign this candidate's exact vmlinuz, then finalize"
          } >> "$GITHUB_STEP_SUMMARY"
