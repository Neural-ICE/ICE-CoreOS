name: promote

# Channel promotion WITHOUT rebuilding: re-tag an already-built, tested digest
# from one channel to another (the staging mechanism).
#
#   dev pushes  ->  :alpha            (build-image workflow, automatic)
#   promote     ->  alpha -> :beta    (this workflow, manual, less frequent)
#   promote     ->  beta  -> :prod    (this workflow, manual, when validated)
#
# Because it only copies the manifest+layers by DIGEST, the exact bits validated
# in alpha are what land in beta and then prod (no drift, no rebuild).

on:
  workflow_dispatch:
    inputs:
      from_channel:
        description: 'Source channel'
        type: choice
        options: [alpha, beta, prod]
        default: alpha
      to_channel:
        description: 'Target channel'
        type: choice
        options: [beta, prod, alpha]
        default: beta
      source_ref:
        description: 'Optional explicit source (e.g. 0.1.0-alpha.42 or sha256:...). Blank = current from_channel tag.'
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    container: quay.io/skopeo/stable:latest
    env:
      REF: ghcr.io/neural-ice/neural-ice-coreos
    steps:
      - name: Validate
        run: |
          if [ '${{ inputs.from_channel }}' = '${{ inputs.to_channel }}' ]; then
            echo "::error::from_channel and to_channel must differ"; exit 1
          fi

      - name: Log in to GHCR
        run: skopeo login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}"

      - name: Resolve source digest
        id: src
        run: |
          SRC='${{ inputs.source_ref }}'
          [ -n "$SRC" ] || SRC='${{ inputs.from_channel }}'
          case "$SRC" in
            sha256:*) SPEC="${REF}@${SRC}" ;;
            *)        SPEC="${REF}:${SRC}" ;;
          esac
          DIGEST="$(skopeo inspect --format '{{.Digest}}' "docker://${SPEC}")"
          echo "spec=${SPEC}"     >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${SPEC} -> ${DIGEST}"

      - name: Promote on GHCR (re-tag the digest onto the target channel)
        run: |
          skopeo copy --all \
            "docker://${REF}@${{ steps.src.outputs.digest }}" \
            "docker://${REF}:${{ inputs.to_channel }}"

      - name: Promote on the sovereign registry (fleet OTA target)
        # The fleet OTAs from registry.neural-ice.ch (ADR-0023), so the channel pointer must move
        # THERE too — else `bootc upgrade` on the appliances never sees the promotion. Copies the
        # SAME digest GHCR -> registry.neural-ice.ch:<channel> (idempotent; the bits were mirrored
        # at build). Gated on the secrets — absent = GHCR-only promotion (safe degradation).
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASS }}
          OTA_REF: registry.neural-ice.ch/neural-ice/neural-ice-coreos
        run: |
          if [ -z "${REGISTRY_PASS}" ]; then
            echo "::warning::REGISTRY_USER/PASS not set — promoted on GHCR only; the fleet OTA channel on registry.neural-ice.ch was NOT moved (add the secrets, ADR-0023)"
            exit 0
          fi
          skopeo login registry.neural-ice.ch -u "${REGISTRY_USER}" -p "${REGISTRY_PASS}"
          skopeo copy --all \
            "docker://${REF}@${{ steps.src.outputs.digest }}" \
            "docker://${OTA_REF}:${{ inputs.to_channel }}"
          echo "sovereign channel moved: ${OTA_REF}:${{ inputs.to_channel }} -> ${{ steps.src.outputs.digest }}"

      - name: Summary
        run: |
          {
            echo "### Promoted ${{ inputs.from_channel }} → ${{ inputs.to_channel }}"
            echo ""
            echo "- source: \`${{ steps.src.outputs.spec }}\`"
            echo "- digest: \`${{ steps.src.outputs.digest }}\`"
            echo "- GHCR channel: \`${REF}:${{ inputs.to_channel }}\`"
            echo "- fleet OTA channel: \`registry.neural-ice.ch/neural-ice/neural-ice-coreos:${{ inputs.to_channel }}\` (if secrets set)"
          } >> "$GITHUB_STEP_SUMMARY"
